        function check_min_max() {
            if (!timeStamp.length) {
                TempMAX.textContent = "-";
                TempMIN.textContent = "-";
                ActualTemp.textContent = "-";
                TempDataMAX.textContent = "-";
                TempDataMIN.textContent = "-";
                ActualTempData.textContent = "-";
                MINY = 0;
                MAXY = 1;
                return;
            }
            ADCvaluesMINC = Infinity;
            ADCvaluesMAXC = -Infinity;
            ADCvaluesMINF = Infinity;
            ADCvaluesMAXF = -Infinity;
            for (var a = 0; a < timeStamp.length; a++) {
                dtaR = parseFloat(ADCvalues[a]);
                if (!isNaN(dtaR)) {
                    if (1 == selected) {
                        if (dtaR > ADCvaluesMAXC) { ADCvaluesMAXC = dtaR; timeStampMAX = timeStamp[a]; }
                        if (dtaR < ADCvaluesMINC) { ADCvaluesMINC = dtaR; timeStampMIN = timeStamp[a]; }
                    } else {
                        if (dtaR > ADCvaluesMAXF) { ADCvaluesMAXF = dtaR; timeStampMAX = timeStamp[a]; }
                        if (dtaR < ADCvaluesMINF) { ADCvaluesMINF = dtaR; timeStampMIN = timeStamp[a]; }
                    }
                }
            }
            1 == selected ? (TempMAX.textContent = ADCvaluesMAXC + LabelBlock, TempMIN.textContent = ADCvaluesMINC + LabelBlock) : (TempMAX.textContent = ADCvaluesMAXF + LabelBlock, TempMIN.textContent = ADCvaluesMINF + LabelBlock);
            TempDataMAX.textContent = (new Date(parseInt(timeStampMAX))).toLocaleString();
            TempDataMIN.textContent = (new Date(parseInt(timeStampMIN))).toLocaleString();
            ActualTemp.textContent = parseFloat(ADCvalues[timeStamp.length - 1]) + LabelBlock;
            ActualTempData.textContent = (new Date(parseInt(timeStamp[timeStamp.length - 1]))).toLocaleString()

            ADCvaluesMINCAmbient = Infinity;
            ADCvaluesMAXCAmbient = -Infinity;
            ADCvaluesMINFAmbient = Infinity;
            ADCvaluesMAXFAmbient = -Infinity;
            for (var a = 0; a < timeStamp.length; a++) {
                dtaR = parseFloat(ADCvaluesAmbient[a]);
                if (!isNaN(dtaR)) {
                    if (1 == selected) {
                        if (dtaR > ADCvaluesMAXCAmbient) { ADCvaluesMAXCAmbient = dtaR; timeStampMAXAmbient = timeStamp[a]; }
                        if (dtaR < ADCvaluesMINCAmbient) { ADCvaluesMINCAmbient = dtaR; timeStampMINAmbient = timeStamp[a]; }
                    } else {
                        if (dtaR > ADCvaluesMAXFAmbient) { ADCvaluesMAXFAmbient = dtaR; timeStampMAXAmbient = timeStamp[a]; }
                        if (dtaR < ADCvaluesMINFAmbient) { ADCvaluesMINFAmbient = dtaR; timeStampMINAmbient = timeStamp[a]; }
                    }
                }
            }

            ADCvaluesMINC > ADCvaluesMINCAmbient ? MINY = ADCvaluesMINCAmbient : MINY = ADCvaluesMINC;
            ADCvaluesMAXC > ADCvaluesMAXCAmbient ? MAXY = ADCvaluesMAXC : MAXY = ADCvaluesMAXCAmbient;
        }

        function celToFah(a) {
            return Math.decimal(9 * a / 5 + 32, 1)
        }
        Math.decimal = function (b, c) {
            var a = Math.pow(10, c + 1);
            b = Math.round(Math.round(b * a) / 10);
            return b / (a / 10)
        };
